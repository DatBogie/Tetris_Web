<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert Audio File</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <style>
        @import "/style.css";
        body {
            padding: 5px;
            gap: 5px;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        textarea {
            width: 500px;
            height: 500px;
            resize: none;
            background-color: var(--base);
            border-color: var(--olc);
            border-style: solid;
            border-width: 2px;
            border-radius: 5px;
            color: white;
        }
        input[type="file"]::file-selector-button {
            background-color: transparent;
            color: white;
            border: none;
        }
        h1 {
            color: white;
        }
        h2 {
            color: var(--text);
        }
    </style>
    <!-- <link type="stylesheet" href="/Modding/modding.css"> -->
    <!-- <link type="stylesheet" href="/style.css"> -->
</head>
<body class="center">
    <h1>Tetris Web Modding Tools</h1>
    <h2>Audio Converter</h2>
    <span class="center" style="gap: 10px;"><button id="copy">Copy Data</button><input type="file" id="file"></span>
    <textarea id="output" readonly></textarea>
</body>
<script src="/Modding/modding.js"></script>
</html>

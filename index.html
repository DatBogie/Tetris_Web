<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="center game-head">
        <canvas id="stale" class="game-canvas" width="320" height="640"></canvas>
        <canvas id="block" class="game-canvas" width="320" height="640"></canvas>
        <canvas id="game" class="game-canvas" width="320" height="640"></canvas>
        <div id="pause-ind" class="center game-canvas" style="width: 100vw; height: 100vh;">
            <div id="pause-text">Paused...</div>
            <div id="pause-btns" class="center">
                <button id="pause-resume">Resume</button>
                <button id="pause-restart">Restart</button>
                <button id="pause-settings">Settings</button>
                <button id="pause-mods">Mods</button>
            </div>
        </div>
        <div id="settings" class="center modal">
            <div>Settings</div>
            <div id="settings-content modal-content" class="center">
                <ul class="layout">
                    <li><span>Ghost Block Opacity: </span><input id="settings-ghost-opacity" type="number" class="percent" data-min="0" data-max="100" name="Test"><span>%</span></li>
                    <details>
                        <summary>Keybinds</summary>
                        <li>
                            <ul class="layout left-align">
                                <li style="gap: 5px;"><span>Move Left: </span><button>Left Arrow</button></li>
                                <li style="gap: 5px;"><span>Move Right: </span><button>Right Arrow</button></li>
                                <li style="gap: 5px;"><span>Soft Drop: </span><button>Down Arrow</button></li>
                                <li style="gap: 5px;"><span>Hard Drop: </span><button>Space</button></li>
                                <li style="gap: 5px;"><span>Rotate Clockwise: </span><button>^</button></li>
                                <li style="gap: 5px;"><span>Rotate Counterclockwise: </span><button>Z</button></li>
                            </ul>
                        </li>
                    </details>
                    <li><button id="settings-back">Back</button></li>
                </ul>
            </div>
        </div>
        <div id="mods" class="center modal">
            <div>Mods</div>
            <div id="mods-content modal-content" class="center">
                <button id="mods-back">Back</button>
            </div>
        </div>
    </div>
    <script type="module" src="index.js"></script>
</body>
</html>

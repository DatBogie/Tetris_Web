<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="center game-head">
        <canvas id="bg" class="game-canvas" width="320" height="640"></canvas>
        <canvas id="stale" class="game-canvas" width="320" height="640"></canvas>
        <canvas id="block" class="game-canvas" width="320" height="640"></canvas>
        <canvas id="game" class="game-canvas" width="320" height="640"></canvas>
        <div id="pause-ind" class="center game-canvas" style="width: 100vw; height: 100vh;">
            <div id="pause-text">Paused...</div>
            <div id="pause-btns" class="center">
                <button id="pause-resume" class="keyboard-selectable">Resume</button>
                <button id="pause-restart" class="keyboard-selectable">Restart</button>
                <button id="pause-settings" class="keyboard-selectable">Settings</button>
                <button id="pause-mods" class="keyboard-selectable">Mods</button>
            </div>
        </div>
        <div id="settings" class="center modal">
            <div>Settings</div>
            <div id="settings-content" class="center modal-content">
                <ul class="layout">
                    <li><span>Ghost Block Opacity: </span><input id="settings-ghost-opacity" type="number" class="percent keyboard-selectable" data-min="0" data-max="100"><span>%</span></li>
                    <li><span>Animations: </span><input id="settings-anims" type="checkbox" autocomplete="off" class="keyboard-selectable"></li>
                    <li><span>Game Width: </span><input id="settings-game-width" type="number" class="int keyboard-selectable" data-funcs="NewGame,DrawGrid" data-min="4" data-max="1000"><span>px</span></li>
                    <li><span>Game Height: </span><input id="settings-game-height" type="number" class="int keyboard-selectable" data-funcs="NewGame,DrawGrid" data-min="4" data-max="1000"><span>px</span></li>
                    <li><span>Gravity: </span><input id="settings-physics" type="checkbox" autocomplete="off" class="keyboard-selectable" data-funcs="NewGame"></li>
                    <details>
                        <summary class="center keyboard-selectable">Keybinds</summary>
                        <li class="details-content">
                            <ul class="layout left-align">
                                <li style="gap: 5px;"><span>Move Left: </span><button class="keybind keyboard-selectable" data-bind="Left" data-key="ArrowLeft"></button></li>
                                <li style="gap: 5px;"><span>Move Right: </span><button class="keybind keyboard-selectable" data-bind="Right" data-key="ArrowRight"></button></li>
                                <li style="gap: 5px;"><span>Soft Drop: </span><button class="keybind keyboard-selectable" data-bind="Soft" data-key="ArrowDown"></button></li>
                                <li style="gap: 5px;"><span>Hard Drop: </span><button class="keybind keyboard-selectable" data-bind="Hard" data-key=" "></button></li>
                                <li style="gap: 5px;"><span>Rotate Clockwise: </span><button class="keybind keyboard-selectable" data-bind="RC" data-key="ArrowUp"></button></li>
                                <li style="gap: 5px;"><span>Rotate Counterclockwise: </span><button class="keybind keyboard-selectable" data-bind="RCC" data-key="z"></button></li>
                            </ul>
                        </li>
                    </details>
                    <li>
                        <div class="center modal-buttons">
                            <button id="settings-back" class="keyboard-selectable">Save &amp; Close</button>
                            <button id="settings-quit" class="keyboard-selectable">Discard &amp; Close</button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
        <div id="mods" class="center modal">
            <div>Mods</div>
            <div id="mods-content" class="center modal-content modal-buttons">
                <button id="mods-back" class="keyboard-selectable">Back</button>
            </div>
        </div>
    </div>
    <script type="module" src="index.js"></script>
</body>
</html>
